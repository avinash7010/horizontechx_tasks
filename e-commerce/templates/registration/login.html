{% extends 'base.html' %}
{% block title %}Login | Northstar Store{% endblock %}
{% block content %}
<section class="container content-card narrow">
    <h1>Login</h1>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Login</button>
    </form>
    <p>Need an account? <a href="{% url 'store:register' %}">Register here</a>.</p>
</section>
{% endblock %}
