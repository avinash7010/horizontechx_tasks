<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Northstar Store{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container nav-bar">
            <a class="brand" href="{% url 'store:product_list' %}">Northstar</a>
            <nav class="nav-links">
                <a href="{% url 'store:product_list' %}">Shop</a>
                <a href="{% url 'store:track_order' %}">Track Order</a>
                <a href="{% url 'store:cart_detail' %}">Cart ({{ cart_count }})</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'store:my_orders' %}">My Orders</a>
                    <form class="inline-action" method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="button button-outline" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a class="button button-outline" href="{% url 'store:register' %}">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% if messages %}
            <div class="container messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
