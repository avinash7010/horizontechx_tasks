{% extends 'base.html' %}
{% block title %}Checkout | Northstar Store{% endblock %}
{% block content %}
<section class="container checkout-layout">
    <div class="content-card">
        <h1>Checkout</h1>
        <form method="post" class="stack-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button" type="submit">Place order</button>
        </form>
    </div>
    <aside class="content-card order-sidebar">
        <h2>Order summary</h2>
        {% for item in items %}
            <p>{{ item.product.name }} x {{ item.quantity }}</p>
        {% endfor %}
        <hr>
        <strong>Total: ${{ subtotal }}</strong>
    </aside>
</section>
{% endblock %}
